<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR WALLET | PRO EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        :root {
            --bg: #030508;
            --card-bg: rgba(255, 255, 255, 0.02);
            --text: #ffffff;
            --accent: #6366f1;
            --border: rgba(255, 255, 255, 0.07);
            --glass: blur(30px);
        }

        [data-theme="light"] {
            --bg: #f3f4f6;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text: #111827;
            --accent: #4f46e5;
            --border: rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .crystal-nav {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: 2rem;
            transition: all 0.3s ease;
        }

        .glass-card:hover { border-color: var(--accent); transform: translateY(-3px); }

        .premium-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #db2777 100%);
            box-shadow: 0 25px 50px -12px rgba(79, 70, 229, 0.3);
        }

        .input-pro {
            background: var(--card-bg) !important;
            border: 1px solid var(--border) !important;
            color: var(--text) !important;
            transition: all 0.3s ease;
        }

        .input-pro:focus { border-color: var(--accent) !important; outline: none; background: rgba(99, 102, 241, 0.05) !important; }

        .btn-pro {
            background: var(--accent);
            color: white;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
            transition: all 0.3s ease;
        }

        .btn-pro:hover { filter: brightness(1.2); letter-spacing: 1px; }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        #toast {
            visibility: hidden;
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text);
            color: var(--bg);
            padding: 1rem 3rem;
            border-radius: 1rem;
            font-weight: 800;
            z-index: 2000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        #toast.show { visibility: visible; animation: slideIn 0.5s forwards; }
        @keyframes slideIn { from { transform: translate(-50%, 100px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    </style>
</head>
<body class="pt-24 pb-20">

    <div id="toast">TRANSACTION SUCCESSFUL</div>

    <nav class="crystal-nav fixed top-0 w-full py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="status-badge">Secure Node</div>
            <span id="live-clock" class="text-[10px] font-mono opacity-50 ml-2">14:39:49</span>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center text-indigo-500">
                <i id="theme-icon" class="fas fa-moon"></i>
            </button>
            <div class="h-8 w-[1px] bg-white/10"></div>
            <div class="flex items-center gap-3">
                <p class="text-[10px] font-bold uppercase tracking-tighter text-right hidden sm:block">Ahmad Ramzan<br><span class="opacity-40 font-normal">Gold Member</span></p>
                <div class="w-10 h-10 rounded-full bg-indigo-600 border-2 border-indigo-400 flex items-center justify-center font-bold text-white shadow-lg">AR</div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6">
        
        <div class="flex flex-col items-center mb-16">
            <div class="relative">
                <div class="w-20 h-20 premium-gradient rounded-3xl flex items-center justify-center text-white text-3xl shadow-2xl mb-4 rotate-3 hover:rotate-0 transition-all">
                    <i class="fas fa-fingerprint"></i>
                </div>
                <div class="absolute -top-2 -right-2 w-6 h-6 bg-emerald-500 rounded-full border-4 border-black animate-pulse"></div>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tighter uppercase">AR<span class="text-indigo-500">Wallet</span> <span class="text-[10px] opacity-30 tracking-[0.5em] ml-2">PRO</span></h1>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <div class="lg:col-span-5 space-y-8">
                <div class="premium-gradient p-10 rounded-[3rem] text-white relative group overflow-hidden">
                    <div class="absolute top-0 right-0 p-10 opacity-10 text-8xl"><i class="fas fa-shield-alt"></i></div>
                    <div class="flex justify-between mb-20 relative">
                        <div>
                            <p class="text-[10px] uppercase tracking-[0.3em] opacity-60">Titanium Credit</p>
                            <h2 class="text-4xl font-bold mt-2">$<span id="balance-val">12,450.00</span></h2>
                        </div>
                        <i class="fas fa-microchip text-4xl opacity-50"></i>
                    </div>
                    <div class="flex justify-between items-end relative">
                        <span class="text-sm font-mono tracking-widest">**** 0853</span>
                        <div class="flex flex-col items-end">
                            <p class="text-[8px] uppercase tracking-widest opacity-50">Expires</p>
                            <p class="text-xs font-bold">12/28</p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <button class="glass-card p-4 flex flex-col items-center gap-2 hover:bg-indigo-500/10">
                        <i class="fas fa-qrcode text-indigo-500"></i>
                        <span class="text-[9px] uppercase font-bold">Scan</span>
                    </button>
                    <button class="glass-card p-4 flex flex-col items-center gap-2 hover:bg-indigo-500/10">
                        <i class="fas fa-wallet text-indigo-500"></i>
                        <span class="text-[9px] uppercase font-bold">Topup</span>
                    </button>
                    <button onclick="clearHistory()" class="glass-card p-4 flex flex-col items-center gap-2 hover:bg-red-500/10">
                        <i class="fas fa-trash-alt text-red-500"></i>
                        <span class="text-[9px] uppercase font-bold">Clear</span>
                    </button>
                </div>

                <div class="glass-card p-8 bg-white/[0.01]">
                    <h3 class="text-[11px] font-bold uppercase tracking-widest mb-6 opacity-60 border-l-2 border-indigo-500 pl-3">Swift Protocol</h3>
                    <div class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-[9px] uppercase tracking-widest opacity-40 ml-2">Receiver Name</label>
                            <input type="text" id="target-name" placeholder="Search contact..." class="w-full px-5 py-4 input-pro">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] uppercase tracking-widest opacity-40 ml-2">Amount (USD)</label>
                            <input type="number" id="target-amount" placeholder="0.00" class="w-full px-5 py-4 input-pro">
                        </div>
                        <button onclick="dispatchAssets()" class="w-full btn-pro py-5 rounded-2xl text-[10px] uppercase">Authorize Dispatch</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7 space-y-6">
                <div class="glass-card p-8 flex items-center justify-between">
                    <div>
                        <h4 class="text-sm font-bold">Asset Analysis</h4>
                        <p class="text-[10px] opacity-40 uppercase tracking-widest">Monthly Spending Flow</p>
                    </div>
                    <div class="flex gap-10">
                        <div class="text-right">
                            <p class="text-[9px] uppercase text-emerald-500 font-bold">Income</p>
                            <p class="text-xl font-bold">$8,200</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] uppercase text-indigo-500 font-bold">Expense</p>
                            <p class="text-xl font-bold" id="expense-val">$3,750</p>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center px-4 mt-8">
                    <h3 class="text-[11px] font-bold uppercase tracking-widest opacity-60">Ledger Records</h3>
                    <div class="flex gap-2">
                        <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                        <div class="w-2 h-2 rounded-full bg-indigo-500"></div>
                    </div>
                </div>

                <div id="ledger-box" class="space-y-4 max-h-[600px] overflow-y-auto pr-2 custom-scroll">
                    </div>
            </div>
        </div>
    </main>

    <script>
        let balance = 12450.00;
        let expense = 3750.00;
        let theme = 'dark';

        let ledger = [
            { id: 1, name: 'AWS Cloud Node', amount: 120.00, time: '2:10 PM', type: 'out', status: 'Success' },
            { id: 2, name: 'Client Payment', amount: 2500.00, time: '11:45 AM', type: 'in', status: 'Verified' },
            { id: 3, name: 'Subdomain Renew', amount: 15.00, time: 'Yesterday', type: 'out', status: 'Success' }
        ];

        // Theme Toggle Logic
        function toggleTheme() {
            const body = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if(theme === 'dark') {
                body.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-sun';
                theme = 'light';
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-moon';
                theme = 'dark';
            }
        }

        // Live Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString();
        }, 1000);

        // Render History
        function renderLedger() {
            const box = document.getElementById('ledger-box');
            if(ledger.length === 0) {
                box.innerHTML = `<div class="glass-card p-20 text-center opacity-20 uppercase tracking-[0.3em] text-[10px]">No Records Found</div>`;
                return;
            }

            box.innerHTML = ledger.map(tx => `
                <div class="glass-card p-5 flex items-center justify-between group">
                    <div class="flex items-center gap-5">
                        <div class="w-12 h-12 rounded-2xl ${tx.type === 'in' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-indigo-500/10 text-indigo-500'} flex items-center justify-center group-hover:scale-110 transition">
                            <i class="fas ${tx.type === 'in' ? 'fa-plus' : 'fa-paper-plane'} text-xs"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-sm tracking-tight">${tx.name}</h4>
                            <p class="text-[9px] opacity-40 font-bold uppercase tracking-widest">${tx.time}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-sm ${tx.type === 'in' ? 'text-emerald-500' : ''}">
                            ${tx.type === 'in' ? '+' : '-'}$${tx.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}
                        </p>
                        <p class="text-[7px] uppercase tracking-widest opacity-40">${tx.status}</p>
                    </div>
                </div>
            `).join('');
        }

        // Dispatch Money
        function dispatchAssets() {
            const name = document.getElementById('target-name').value;
            const amt = parseFloat(document.getElementById('target-amount').value);

            if(!name || isNaN(amt) || amt <= 0) {
                alert("PROTOCOL ERROR: Missing Credentials");
                return;
            }
            if(amt > balance) {
                alert("PROTOCOL ERROR: Insufficient Liquidity");
                return;
            }

            balance -= amt;
            expense += amt;
            
            ledger.unshift({
                id: Date.now(),
                name: name,
                amount: amt,
                time: 'Just Now',
                type: 'out',
                status: 'Authorized'
            });

            // Update UI
            document.getElementById('balance-val').innerText = balance.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('expense-val').innerText = "$" + expense.toLocaleString(undefined, {minimumFractionDigits: 2});
            
            document.getElementById('target-name').value = '';
            document.getElementById('target-amount').value = '';
            
            showToast();
            renderLedger();
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.className = 'show';
            setTimeout(() => t.className = '', 3000);
        }

        function clearHistory() {
            if(confirm("Confirm Wipe: Delete all ledger entries?")) {
                ledger = [];
                renderLedger();
            }
        }

        // Initialize
        renderLedger();
    </script>
</body>
</html>
